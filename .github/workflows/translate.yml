name: Translate Paper
on:
  workflow_dispatch:
    inputs:
      pdf:
        description: "번역할 PDF 파일 이름 (예: paper.pdf)"
        required: true
        default: paper.pdf
jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install google-genai "mineru[core]"
      - name: PDF 분석 (MinerU)
        run: mineru -p "${{ github.event.inputs.pdf }}" -o ./out -b pipeline
      - name: 번역 HTML 만들기
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CL=$(find ./out -name '*_content_list.json' | head -n1)
          echo "찾은 파일: $CL"
          python paper_translator.py "$CL" -o paper_ko.html
      - uses: actions/upload-artifact@v4
        with:
          name: paper_ko_html
          path: paper_ko.html
